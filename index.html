<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Clive Mutale | Polymath Portfolio</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none';">
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --bg: #0a0a0a; --text: #e0e0e0; --accent: #00ff41; --glass: rgba(255, 255, 255, 0.05); --danger: #ff3333; --terminal-bg: #000; }
        .navy-mode { --bg: #000b1a; --accent: #ffffff; --terminal-bg: #001a33; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; transition: 0.3s; }
        header { height: 75vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        #matrix-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.15; }
        .hero-content { z-index: 2; text-align: center; padding: 20px; }
        .terminal-container { max-width: 850px; margin: -80px auto 50px; background: var(--terminal-bg); border-radius: 8px; border: 1px solid #333; z-index: 10; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        .terminal-header { background: #222; padding: 10px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #333; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        #mode-toggle { margin-left: auto; cursor: pointer; font-size: 10px; border: 1px solid #444; padding: 2px 6px; color: #888; font-family: monospace; }
        .terminal-body { padding: 20px; font-family: 'Courier New', monospace; color: var(--accent); height: 450px; overflow-y: auto; font-size: 14px; scroll-behavior: smooth; }
        #terminal-input { background: transparent; border: none; color: var(--accent); outline: none; width: 70%; font-size: 16px; font-family: monospace; }
        .section { max-width: 1100px; margin: 100px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .card { background: var(--glass); padding: 30px; border-radius: 15px; border: 1px solid #222; }
        #reboot-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; color: #fff; z-index: 9999; padding: 50px; font-family: monospace; display: none; }
        .ascii-row { font-size: 6px; line-height: 6px; white-space: pre; }
    </style>
</head>
<body>
    <div id="reboot-screen"></div>
    <header>
        <canvas id="matrix-bg"></canvas>
        <div class="hero-content">
            <h1>David Clive Mutale</h1>
            <div class="glitch">> POLYMATH | RESEARCHER | ETHICAL HACKER</div>
        </div>
    </header>

    <div class="terminal-container">
        <div class="terminal-header">
            <div class="dot" style="background:#ff5f56"></div><div class="dot" style="background:#ffbd2e"></div><div class="dot" style="background:#27c93f"></div>
            <div id="mode-toggle">[ MODE: HACKER ]</div>
        </div>
        <div class="terminal-body" id="terminal">
            <div id="history"><div>[SYSTEM] Online. TAB to autocomplete. 'help' to start.</div></div>
            <div id="input-line"><span>$ </span><input type="text" id="terminal-input" autofocus autocomplete="off"></div>
        </div>
    </div>

    <section class="section"><div class="grid">
        <div class="card"><h2>Skill Matrix</h2><canvas id="radarChart"></canvas></div>
        <div class="card"><h2>Quick Uplink</h2><form id="contact-form" style="display:flex; flex-direction:column; gap:10px;">
            <input type="text" placeholder="ID" required style="padding:10px; background:#000; border:1px solid #333; color:var(--accent); font-family:monospace;">
            <textarea placeholder="DATA" required style="padding:10px; background:#000; border:1px solid #333; color:var(--accent); font-family:monospace;"></textarea>
            <button type="submit" style="padding:10px; background:var(--accent); color:#000; font-weight:bold; border:none; cursor:pointer;">SEND</button>
        </form></div>
    </div></section>

    <script>
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        const sleep = ms => new Promise(res => setTimeout(res, ms));
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() { ctx.fillStyle = "rgba(10, 10, 10, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.fillStyle = "#00ff41"; ctx.font = "16px monospace"; drops.forEach((y, i) => { ctx.fillText("01"[Math.floor(Math.random()*2)], i*16, y*16); if (y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0; drops[i]++; }); }
        setInterval(draw, 35);

        // ASCII Art defined for the scan animation
        const myAsciiArt = `&&&&&@&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&&

&@&&&&&&%%%%%%%%%%%%%,,,,,,,,.,.,,,,,,,,,,,,,,,,,,,,,,,**,,*%%%%%%%%%%%%%%%%%*&&
&@@&%%%%%%%%%%%%%%%#,,,,,,,,,,,,,,,,,,,****,,,,,,,,,,,,,,,,*,*%%%%%%%%%%%%%%%*&&
&@@&&&%%%%%%%%%%%%%,,,,,,,,.,,,*******************,,,,,,,,,,**(%%%&%%%%%%%%%%*%&
@@@&&%%%%%%%%%%%%%%**,,,,,.,,,,****/////*//******,,,,,,,,,,,***%%%%%%&%&&%%%&*%&
@@@&%%&%%%%%%%%%%%#***,,,,,,,,,*,*******//******,,,,,,,,,,**//*%%%%%%%%%%%&%&*%&
@@@&&&%%%%%%%%%%%%%,***,,,,,,*,,*/////////////**,*,,,,,,,**//**&%%%%%%%%%%%%&*%&
@@@&&&%%%%%%%%%%%%%*//**.,,,****,,,****///****,,****,,,,**///*#&%&%%&&%%%%%%%*%&
@@@&&&%%%%%%%%%%%%%*//**,,,. .....,,,**///*,,,, .....,***////*%%%%%%%%%%%%%&%*%&
&@@&&%&%%%%%%%%%.,,***,,,,,,........,,,**,,,..,*...,,,,,,,///*,,,&%%&%%&%%%%%*%&
&@@&&%%%%%%%%%%%.,,***,,,,*******,.,,,,,,,,,,,.*******,,***//,,,,%%%%%%%&%%&%*#&
@@@&%%%%%%%%%%%%(,.**,,,,,///*****.,,,***,,,,,*****///,,,*///.*,%%&%%&&%%%%%%*%&
@@@&&%%%%%%%%%%%%,,.**,,,,****((/,,,**///***,*,*((/***,,,**/,.,%%%%%&&%%%%%%%*&&
@@@&%%%%%%%%%%%%%%**/*,,,,,**///***,..,**, .**,///***,*,**//**%&%%%&%%%%&%%%%*&&
@@@%%%%%%%%%%%%%%%%%/**,,,,,,******,,,,***,,********,,****/#%%%%&&%%%&%%%%%%%/&&
@@@%%%%%%%%%%%%%%%%%#*,,,,,,,,,,,,,,,,,.,**,,,,,,,*,**,**//%%%%&%%&%%%%%%%%%%/&&
@@@%%%%%%%%%%%%%%%%%%**,,,,,,,,,,,,,**/*///***,,,,***,,*//(&&&&&%&&&&%%%%%%%%/&&
@@@&%%%%%%%%%%%%%%%%%/*,,,,,,,*,.,***/**/*/***,,,,******//#%&&&&&&%%%%%&%%%%%*&&
@@@&&%%%%%%%%%%%%%%%%%*,,,,,,,,,*,,***///**/**,*,*******/#%&%&&&&&&&&%&&%%&%&/&&

@@&&%%%%%%%%%%%%%%%&%%%%%%*......,,,,*******,,,......,,,*##%&&%%%&%%&%%&%%%%%(&&

@@&%%#(%#(%%#%(###%#%#%%(#...***,,,****,********,,,,,,..#%/##%##%#(%#((%%(%%#/&&
@@%#(%%%(%#(#%(#%(%#%#%/((%..,****,*************,,,*,..#/%#%#%%(%##%(#/%(%(%(/&&

@@#%(%#%/%/%%(#%(%#%###%##%(*..,,,,******//*,**,,,,../(%/%/%(%#&#%#%%(##(%(%(/&&

@%%%(%#/%(%(%((%%#%/%%(%#%(#%#%,%(*//////////**,/#%.(%/%/&(%/%(%%%%%%#(/%%%/&/%&
&&@@@@@@@@@@@&&&&@&&&&&&&@&&&&&&&&&&&&&@@@&@&&&&&@@@@&&@@@@@&&&&@&&&&%&%&#&#&%&`.split('\n');

        const input = document.getElementById('terminal-input');
        const history = document.getElementById('history');
        const cmds = ["help", "whoami", "skills", "research", "status", "clear", "contact", "wget", "reboot", "mode"];
        
        const cmdHandlers = {
            help: () => "Commands: whoami, skills, research, status, contact, wget ./cv_mutale.pdf, reboot, mode, clear",
            whoami: async () => {
                history.innerHTML += "<div>[SYSTEM] Drawing Biometric Signature...</div>";
                for (let line of myAsciiArt) {
                    const row = document.createElement('div');
                    row.className = "ascii-row";
                    row.textContent = line;
                    history.appendChild(row);
                    row.style.color = "var(--accent)";
                    document.getElementById('terminal').scrollTop = 10000;
                    await sleep(30);
                    row.style.opacity = "0.6";
                }
                return "[AUTHENTICATED]: David Clive Mutale Profile Loaded.";
            },
            skills: () => "Python, C++, SQL, R, PenTesting, Adobe, IT Infra, Cultural Science.",
            status: () => "Probes: 4,092 | Stability: Nominal | Kernel: 5.15.0-Polymath",
            wget: async (arg) => { if(arg === "./cv_mutale.pdf") { 
                const b = document.createElement('div'); history.appendChild(b);
                for(let i=0; i<=20; i++){ b.textContent=`Download: [${'='.repeat(i)}${'-'.repeat(20-i)}] ${i*5}%`; await sleep(50); }
                const a = document.createElement('a'); a.href = './cv_mutale.pdf'; a.download = 'David_Mutale_CV.pdf'; a.click();
                return "CV extraction successful.";
            } return "Usage: wget ./cv_mutale.pdf"; },
            reboot: async () => { 
                const s = document.getElementById('reboot-screen'); s.style.display='block';
                const lines=["BIOS v4.2","MUTALE-ARCH Initialized","RAM: 32GB OK","CLEAN BOOT..."];
                for(let l of lines){ const p=document.createElement('p'); p.textContent=`> ${l}`; s.appendChild(p); await sleep(400); }
                location.reload();
            }
        };

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') { e.preventDefault(); const val = input.value.trim().toLowerCase(); const m = cmds.find(c => c.startsWith(val)); if (m) input.value = m; }
        });

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const val = input.value.trim().toLowerCase();
                const [cmd, ...args] = val.split(' ');
                const histLine = document.createElement('div'); histLine.innerHTML = `<span style="color:#fff">$ ${val}</span>`;
                history.appendChild(histLine);
                if (cmd === 'clear') history.innerHTML = '';
                else if (cmd === 'mode') document.getElementById('mode-toggle').click();
                else if (cmdHandlers[cmd]) {
                    const res = await cmdHandlers[cmd](args.join(' '));
                    if(res) { const r=document.createElement('div'); r.style.color="#888"; r.textContent=res; history.appendChild(r); }
                } else if (val) {
                    const err=document.createElement('div'); err.style.color="red"; err.textContent=`Cmd not found: ${cmd}`; history.appendChild(err);
                }
                input.value = ''; document.getElementById('terminal').scrollTop = 10000;
            }
        });

        const toggle = document.getElementById('mode-toggle');
        toggle.addEventListener('click', () => {
            const isNavy = document.body.classList.toggle('navy-mode');
            document.querySelector('.terminal-container').classList.toggle('navy-mode');
            toggle.textContent = isNavy ? "[ MODE: NAVY ]" : "[ MODE: HACKER ]";
            localStorage.setItem('theme', isNavy ? 'navy' : 'hacker');
        });
        if(localStorage.getItem('theme')==='navy') toggle.click();

        new Chart(document.getElementById('radarChart'), { 
            type: 'radar', 
            data: { labels: ['Security', 'Math', 'Data', 'Design', 'Research'], datasets: [{ data:, borderColor: '#00ff41', backgroundColor: 'rgba(0,255,65,0.1)' }] },
            options: { plugins: { legend: { display: false } }, scales: { r: { grid: { color: '#333' }, angleLines: { color: '#333' }, pointLabels: { color: '#fff' }, ticks: { display: false } } } }
        });
    </script>
</body>
</html>
